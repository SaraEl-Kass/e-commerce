  <div class="login-container">
    <div class="login-box">
      <div class="brand">
        NM.<span class="highlight">H</span>
      </div>
      <h1>Welcome back</h1>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="email">Email*</label>
          <input id="email" formControlName="email" type="email" placeholder="Enter your email" />
          <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="error">
            Valid email is required.
          </div>
        </div>
        <div class="form-group">
          <label for="password">Password*</label>
          <input id="password" formControlName="password" type="password" placeholder="Enter your password" />
          <!-- <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="error">
            Password must be at least 8 characters.
          </div> -->
        </div>
        <button type="submit" class="login-button" [disabled]="loginForm.invalid">Login</button>
      </form>
      <p class="signup-link">Don't have an account? <a routerLink="/signup">Sign up</a></p>
    </div>
    <div class="login-side">
      <p>Good things are coming your way!</p>
    </div>
  </div>
